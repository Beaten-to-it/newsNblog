name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Render email/blog artifacts (all tracks)
        shell: bash
        run: |
          for f in briefings/*.md; do
            [ -e "$f" ] || continue
            d="$(basename "$f" .md)"
            python scripts/render_briefing.py "$d"
          done
          for f in briefings/ax/*.md; do
            [ -e "$f" ] || continue
            b="$(basename "$f" .md)"
            case "$b" in _*) continue;; esac   # skip spike/backup artifacts
            python scripts/render_briefing.py --track ax "$b"
          done
      - name: Build static site
        run: python scripts/build_site.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
